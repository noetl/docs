name: Deploy Docs to Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "src/**"
      - "static/**"
      - "docusaurus.config.ts"
      - "sidebars.ts"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-cloudflare-pages.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-pages-docs
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build documentation
        run: npm run build

      - name: Resolve Cloudflare Pages project
        id: project
        shell: bash
        env:
          PROJECT_FROM_VAR: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}
        run: |
          set -euo pipefail
          if [[ -n "${PROJECT_FROM_VAR}" ]]; then
            echo "name=${PROJECT_FROM_VAR}" >> "${GITHUB_OUTPUT}"
          else
            echo "name=noetl-docs" >> "${GITHUB_OUTPUT}"
          fi

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy build --project-name ${{ steps.project.outputs.name }} --branch main
